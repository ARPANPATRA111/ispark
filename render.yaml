# Render Blueprint for the iSPARC Go API (test deployment).
#
# No Render CLI needed: push this branch to GitHub, then in the Render
# dashboard choose "New +" -> "Blueprint", pick the repo and this branch, and
# Render reads this file.
#
# This file contains NO secrets. Everything sensitive is marked sync:false,
# which means Render prompts for it in the dashboard and stores it there; the
# JWT secrets are generated by Render itself and never leave it.
#
# The database is supplied as ONE value (DATABASE_URL) rather than six separate
# fields, because a single copy-paste cannot be assembled incorrectly.
#
# The web frontend lives on Vercel and the database on Supabase — Render only
# runs the API container (free plan: sleeps after ~15 min idle, first request
# then takes ~1 min to cold-start).

services:
  - type: web
    name: ispark-api
    runtime: docker
    rootDir: api
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore # closest Render region to India
    branch: local-validation
    healthCheckPath: /health
    envVars:
      # --- Database: one connection string, entered in the dashboard ---
      # Ready-made value is the DATABASE_URL line in api/.env.supabase.
      # Form: postgresql://postgres.<ref>:<password>@<pooler-host>:5432/postgres?sslmode=require
      # Use the SESSION pooler (port 5432). If you switch to the transaction
      # pooler (6543), also add DB_PREFER_SIMPLE_PROTOCOL=true.
      - key: DATABASE_URL
        sync: false

      # --- Auth secrets (Render generates strong random values) ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # --- CORS: the deployed web origin(s), comma-separated ---
      # Must list every origin the browser loads the site from. If the Vercel
      # project is renamed or a domain is added, add it here or the browser
      # blocks all API calls (symptom: captcha never loads, no data appears).
      - key: ALLOWED_ORIGINS
        value: https://ispark-iips.vercel.app,https://ispark-roan.vercel.app
      # Optional: also allow this project's per-deployment preview URLs, which
      # look like ispark-<hash>-<account>-projects.vercel.app. The account
      # segment is included deliberately: a pattern such as
      # "^https://ispark-[a-z0-9-]+\.vercel\.app$" would also match a bare
      # "ispark-anything.vercel.app" that someone else could register.
      - key: ALLOWED_ORIGIN_REGEX
        value: ^https://ispark-[a-z0-9]+-arpanpatra111s-projects\.vercel\.app$

      # --- Vercel Blob (private store ispark-certificates) ---
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: BLOB_ACCESS
        value: private

      # --- Demo data: already seeded in Supabase, so keep this false ---
      - key: SEED_DEV_DATA
        value: "false"

      # --- Email delivery ---
      # BREVO_API_KEY sends over HTTPS and is strongly preferred: Render blocks
      # outbound SMTP, which made registration hang ~135s per request before
      # silently falling back to logging. SMTP_* below is only a fallback for
      # environments where outbound SMTP does work.
      # SMTP_SENDER must be an address verified in Brevo.
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_SENDER
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
