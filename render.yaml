# Render Blueprint for the iSPARC Go API (test deployment).
#
# No Render CLI needed: push this branch to GitHub, then in the Render
# dashboard choose "New +" -> "Blueprint", pick the repo and this branch, and
# Render reads this file.
#
# This file contains NO secrets. Everything sensitive is marked sync:false,
# which means Render prompts for it in the dashboard and stores it there; the
# JWT secrets are generated by Render itself and never leave it.
#
# The database is supplied as ONE value (DATABASE_URL) rather than six separate
# fields, because a single copy-paste cannot be assembled incorrectly.
#
# The web frontend lives on Vercel and the database on Supabase — Render only
# runs the API container (free plan: sleeps after ~15 min idle, first request
# then takes ~1 min to cold-start).

services:
  - type: web
    name: ispark-api
    runtime: docker
    rootDir: api
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore # closest Render region to India
    branch: local-validation
    healthCheckPath: /health
    envVars:
      # --- Database: one connection string, entered in the dashboard ---
      # Ready-made value is the DATABASE_URL line in api/.env.supabase.
      # Form: postgresql://postgres.<ref>:<password>@<pooler-host>:5432/postgres?sslmode=require
      # Use the SESSION pooler (port 5432). If you switch to the transaction
      # pooler (6543), also add DB_PREFER_SIMPLE_PROTOCOL=true.
      - key: DATABASE_URL
        sync: false

      # --- Auth secrets (Render generates strong random values) ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # --- CORS: the deployed web origin(s), comma-separated ---
      - key: ALLOWED_ORIGINS
        value: https://ispark-roan.vercel.app

      # --- Vercel Blob (private store ispark-certificates) ---
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: BLOB_ACCESS
        value: private

      # --- Demo data: already seeded in Supabase, so keep this false ---
      - key: SEED_DEV_DATA
        value: "false"

      # --- SMTP via Brevo (verified working; secrets in mks/DEPLOY-SECRETS.local.md).
      # Leave USER/PASS/SENDER empty to fall back to console-logged OTPs. ---
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SENDER
        sync: false
